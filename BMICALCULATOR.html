<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="./JS/BMIcalculator.js" defer></script>
</head>
<body>  

    <!-- Hero Section -->
    <section class="hero"></section>

    <!-- Header -->
    <header>
        <h1>BMI Calculator</h1>
        <h2>BMI (Body Mass Index) is a simple number used to estimate whether a person has a healthy body weight for their height.</h2>
    </header>

    <!-- NAV BAR -->
    <nav class="navbar">
        <ul>
            <li><a href="./index.html">Home</a></li>
            <li><a href="./About.html">About</a></li>
            <li><a href="./Calculators.html">Calculators</a></li>
            <li><a href="./Contact.html">Contact Me</a></li>
        </ul>
    </nav>

    <!-- Inputs Container -->
    <div class="bmi-container">
        <label for="weight">Weight (kg):</label>
        <input type="number" id="weight" step="0.1" placeholder="e.g. 75">

        <label for="height">Height:</label>
        <input type="text" id="height" placeholder="e.g. 1.80 or 180">

        <label for="heightUnit">Unit:</label>
        <select id="heightUnit">
            <option value="m">meters</option>
            <option value="cm">centimeters</option>
        </select>

        <button class="bmi-button" onclick="bmiCalculator()">Calculate BMI</button>

        <p id="bmiResult"></p>

        <img src="./Pictures/BMI-Chart-Revised (1).png" alt="BMI Chart">
    </div>

    <footer>© 2026 Noah Farinha</footer>
</body>
</html>
